name: CI

# CI: on every pull request, check the code BEFORE it can merge.
on:
  pull_request:
    branches: [main]

permissions:
  id-token: write # to run `terraform plan` against AWS (read-only preview)
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra
    steps:
      - name: Check out the code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (keyless, via OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::804838453270:role/trend-tracker-gha-deploy
          aws-region: us-east-2

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Check formatting
        run: terraform fmt -check -recursive

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan (preview only)
        run: terraform plan -no-color
