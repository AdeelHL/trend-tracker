name: Deploy to AWS

# CD: every push to main automatically deploys the infrastructure.
on:
  push:
    branches: [main]
  workflow_dispatch: {} # also allow manual runs from the GitHub UI

# OIDC needs permission to request a short-lived token.
permissions:
  id-token: write # required for the keyless AWS login
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra
    steps:
      - name: Check out the code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (keyless, via OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::804838453270:role/trend-tracker-gha-deploy
          aws-region: us-east-2

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      - name: Terraform Apply
        run: terraform apply -auto-approve
